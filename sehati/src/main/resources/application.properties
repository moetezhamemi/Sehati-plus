spring.application.name=sehati
spring.datasource.url=jdbc:mysql://localhost:3306/sehati_db?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
server.port= 6060
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
